<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>조건 관리 | 찰떡 어드민</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/base :: globalNav}"></nav>
<div class="container mt-4">
    <h2 class="mb-4">회원가입 조건 관리</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>순서</th>
                <th>조건 유형</th>
                <th>표시명</th>
                <th>필수 여부</th>
                <th>활성 상태</th>
                <th>필수 토글</th>
                <th>활성 토글</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cond : ${conditions}">
                <td th:text="${cond.displayOrder}">1</td>
                <td><code th:text="${cond.consentType}">TERMS</code></td>
                <td th:text="${cond.displayName}">이용약관</td>
                <td>
                    <span th:if="${cond.isRequired}" class="badge bg-danger">필수</span>
                    <span th:unless="${cond.isRequired}" class="badge bg-secondary">선택</span>
                </td>
                <td>
                    <span th:if="${cond.isActive}" class="badge bg-success">활성</span>
                    <span th:unless="${cond.isActive}" class="badge bg-warning text-dark">비활성</span>
                </td>
                <td>
                    <form th:action="@{/admin/conditions/{uuid}/toggle-required(uuid=${cond.conditionUuid})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-primary">
                            <span th:text="${cond.isRequired} ? '선택으로 변경' : '필수로 변경'">토글</span>
                        </button>
                    </form>
                </td>
                <td>
                    <form th:action="@{/admin/conditions/{uuid}/toggle-active(uuid=${cond.conditionUuid})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                            <span th:text="${cond.isActive} ? '비활성화' : '활성화'">토글</span>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(conditions)}">
                <td colspan="7" class="text-center text-muted">조건 데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
