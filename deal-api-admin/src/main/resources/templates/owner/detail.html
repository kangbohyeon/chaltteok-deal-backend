<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>점주 상세 | 찰떡 어드민</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav th:replace="~{layout/base :: globalNav}"></nav>
<div class="container mt-4">
    <div class="d-flex align-items-center mb-4 gap-3">
        <a th:href="@{/admin/owners}" class="btn btn-outline-secondary btn-sm">← 목록</a>
        <h2 class="mb-0">점주 상세</h2>
    </div>
    <div class="card">
        <div class="card-body">
            <table class="table table-borderless">
                <tbody>
                <tr>
                    <th style="width: 150px" class="text-muted">UUID</th>
                    <td><code th:text="${owner.ownerUuid}">uuid</code></td>
                </tr>
                <tr>
                    <th class="text-muted">사용자명</th>
                    <td th:text="${owner.username}">username</td>
                </tr>
                <tr>
                    <th class="text-muted">이름</th>
                    <td th:text="${owner.name}">이름</td>
                </tr>
                <tr>
                    <th class="text-muted">역할</th>
                    <td><span class="badge bg-info text-dark" th:text="${owner.role}">MASTER</span></td>
                </tr>
                <tr>
                    <th class="text-muted">비밀번호 변경일</th>
                    <td th:text="${owner.passwordChangedAt != null ? #temporals.format(owner.passwordChangedAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                </tr>
                <tr>
                    <th class="text-muted">가입일</th>
                    <td th:text="${#temporals.format(owner.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                </tr>
                <tr>
                    <th class="text-muted">최종 수정일</th>
                    <td th:text="${#temporals.format(owner.updatedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
