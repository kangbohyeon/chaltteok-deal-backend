<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>점주 관리 | 찰떡 어드민</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/admin">찰떡 어드민</a>
    <div class="d-flex gap-3">
        <a class="nav-link text-white" th:href="@{/admin/conditions}">조건 관리</a>
        <a class="nav-link text-white" th:href="@{/admin/owners}">점주 관리</a>
    </div>
</nav>
<div class="container mt-4">
    <h2 class="mb-4">점주 관리</h2>
    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>사용자명</th>
                <th>이름</th>
                <th>역할</th>
                <th>가입일</th>
                <th>상세</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="owner : ${owners.content}">
                <td th:text="${owner.id}">1</td>
                <td th:text="${owner.username}">username</td>
                <td th:text="${owner.name}">이름</td>
                <td><span class="badge bg-info text-dark" th:text="${owner.role}">MASTER</span></td>
                <td th:text="${#temporals.format(owner.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                <td>
                    <a th:href="@{/admin/owners/{id}(id=${owner.id})}" class="btn btn-sm btn-outline-dark">상세</a>
                </td>
            </tr>
            <tr th:if="${owners.totalElements == 0}">
                <td colspan="6" class="text-center text-muted">등록된 점주가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav th:if="${owners.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${owners.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/owners(page=${currentPage - 1})}">이전</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, owners.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/admin/owners(page=${i})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${owners.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/owners(page=${currentPage + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
